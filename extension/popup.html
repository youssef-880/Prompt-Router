<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gateway Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 16px;
      background-color: #f9f9f9;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover {
      background-color: #0056b3;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: green;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Gemini Gateway Council</h2>
  <label for="apiKey">Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="AIzaSy..." />
  
  <button id="saveBtn">Save Key</button>
  <div id="status" class="status">Saved successfully!</div>
  <script src="popup.js"></script>
</body>
</html>
